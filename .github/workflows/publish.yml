# Automatically builds and publishes the NuGet package
# to GitHub Packages on every push to main

name: Publish NuGet Package

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add GitHub Packages NuGet source
        run: dotnet nuget add source --username josiah1chuku --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/josiah1chuku/index.json"

      - name: Pack
        run: dotnet pack -c Release

      - name: Publish to GitHub Packages
        run: dotnet nuget push ./bin/Release/HelloWorld.Lib.*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "github"
